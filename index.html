<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
    <title>VOID RACER 3D 💀</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#000;overflow:hidden;font-family:'Orbitron',monospace}
        #c{display:block;width:100vw;height:100vh}
        #ui{position:absolute;top:15px;left:0;right:0;display:flex;justify-content:space-around;color:#0f0;font-size:1.1rem;font-weight:900;text-shadow:0 0 10px #0f0;pointer-events:none}
        #startScreen{position:absolute;inset:0;background:rgba(0,0,0,0.95);display:flex;flex-direction:column;justify-content:center;align-items:center;color:#0f0;text-align:center;padding:20px;z-index:10}
        #startScreen h1{font-size:2.5rem;margin-bottom:20px;text-shadow:0 0 20px #0f0}
        #startScreen p{margin:8px 0;font-size:1rem;color:#0ff}
        #startScreen button{background:#0f0;color:#000;border:none;padding:18px 40px;font-size:1.3rem;font-weight:900;font-family:'Orbitron';cursor:pointer;margin-top:25px}
        #startScreen button:active{transform:scale(0.95)}
       .controls{position:absolute;bottom:20px;left:0;right:0;display:flex;justify-content:center;gap:60px;z-index:5}
       .control-btn{width:70px;height:70px;background:rgba(0,255,0,0.2);border:2px solid #0f0;border-radius:50%;color:#0f0;font-size:2rem;display:flex;align-items:center;justify-content:center;user-select:none}
       .control-btn:active{background:#0f0;color:#000}
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
        }
    }
    </script>
</head>
<body>
    <canvas id="c"></canvas>
    <div id="ui">
        <div>SCORE: <span id="score">0</span></div>
        <div>FUEL: <span id="fuel">100</span></div>
        <div>SPEED: <span id="speed">0</span></div>
    </div>
    <div class="controls">
        <div class="control-btn" id="leftBtn">←</div>
        <div class="control-btn" id="rightBtn">→</div>
    </div>
    <div id="startScreen">
        <h1>VOID RACER 3D 💀</h1>
        <p>SWIPE OR TAP TO DODGE</p>
        <p>COLLECT FUEL ⚡</p>
        <p>AVOID FIREWALLS 🚧</p>
        <p>HIGH SCORE: <span id="highScore">0</span></p>
        <button onclick="startGame()">RACE</button>
    </div>

<script type="module">
import * as THREE from 'three';

const canvas = document.getElementById('c');
const scoreEl = document.getElementById('score');
const fuelEl = document.getElementById('fuel');
const speedEl = document.getElementById('speed');
const startScreen = document.getElementById('startScreen');
const highScoreEl = document.getElementById('highScore');

let gameRunning = false;
let score = 0;
let fuel = 100;
let gameSpeed = 0.3;
let highScore = localStorage.getItem('voidRacer3DHS') || 0;
highScoreEl.textContent = highScore;

// Three.js setup
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x000000, 10, 50);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 4, 8);
camera.lookAt(0, 0, -10);

const renderer = new THREE.WebGLRenderer({canvas, antialias: true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

// Lights
const ambientLight = new THREE.AmbientLight(0x00ff00, 0.3);
scene.add(ambientLight);
const dirLight = new THREE.DirectionalLight(0x00ff00, 1);
dirLight.position.set(5, 10, 5);
scene.add(dirLight);

// Road
const roadGeo = new THREE.PlaneGeometry(12, 200);
const roadMat = new THREE.MeshStandardMaterial({color: 0x111111, emissive: 0x001100});
const road = new THREE.Mesh(roadGeo, roadMat);
road.rotation.x = -Math.PI / 2;
road.position.z = -80;
scene.add(road);

// Road lines
const lineGroup = new THREE.Group();
for(let i = 0; i < 20; i++) {
    const lineGeo = new THREE.BoxGeometry(0.2, 0.1, 3);
    const lineMat = new THREE.MeshBasicMaterial({color: 0x00ff00});
    const line1 = new THREE.Mesh(lineGeo, lineMat);
    line1.position.set(-2, 0.06, -i * 10);
    const line2 = line1.clone();
    line2.position.set(2, 0.06, -i * 10);
    lineGroup.add(line1, line2);
}
scene.add(lineGroup);

// Player car
const playerGeo = new THREE.BoxGeometry(1.2, 0.6, 2);
const playerMat = new THREE.MeshStandardMaterial({
    color: 0x00ffff,
    emissive: 0x00ffff,
    emissiveIntensity: 0.5
});
const player = new THREE.Mesh(playerGeo, playerMat);
player.position.set(0, 0.4, 0);
scene.add(player);

// Obstacles + fuel
let obstacles = [];
let fuels = [];

const obstacleGeo = new THREE.BoxGeometry(1.2, 1.2, 1.2);
const obstacleMat = new THREE.MeshStandardMaterial({
    color: 0xff0000,
    emissive: 0xff0000,
    emissiveIntensity: 0.8
});

const fuelGeo = new THREE.OctahedronGeometry(0.4);
const fuelMat = new THREE.MeshStandardMaterial({
    color: 0x00ff00,
    emissive: 0x00ff00,
    emissiveIntensity: 1
});

let lanes = [-4, 0, 4];
let playerLane = 1;
let targetX = 0;

function startGame() {
    gameRunning = true;
    score = 0;
    fuel = 100;
    gameSpeed = 0.3;
    playerLane = 1;
    targetX = lanes[playerLane];
    player.position.x = targetX;

    obstacles.forEach(o => scene.remove(o));
    fuels.forEach(f => scene.remove(f));
    obstacles = [];
    fuels = [];

    startScreen.style.display = 'none';
    animate();
}

function spawnObstacle() {
    if (Math.random() < 0.03) {
        const lane = Math.floor(Math.random() * 3);
        const obs = new THREE.Mesh(obstacleGeo, obstacleMat);
        obs.position.set(lanes[lane], 0.6, -50);
        scene.add(obs);
        obstacles.push(obs);
    }
}

function spawnFuel() {
    if (Math.random() < 0.015) {
        const lane = Math.floor(Math.random() * 3);
        const f = new THREE.Mesh(fuelGeo, fuelMat);
        f.position.set(lanes[lane], 0.8, -50);
        scene.add(f);
        fuels.push(f);
    }
}

function animate() {
    if (!gameRunning) return;
    requestAnimationFrame(animate);

    gameSpeed += 0.00005;
    fuel -= 0.03;
    score += 0.1;

    if (fuel <= 0) {
        gameOver();
        return;
    }

    // Move player smoothly
    player.position.x += (targetX - player.position.x) * 0.15;
    player.rotation.z = (targetX - player.position.x) * 0.1;

    // Move road lines
    lineGroup.children.forEach(line => {
        line.position.z += gameSpeed * 60;
        if (line.position.z > 10) line.position.z -= 200;
    });

    // Spawn
    spawnObstacle();
    spawnFuel();

    // Update obstacles
    obstacles.forEach((obs, i) => {
        obs.position.z += gameSpeed * 60;
        obs.rotation.y += 0.02;
        obs.rotation.x += 0.02;

        // Collision
        if (Math.abs(player.position.x - obs.position.x) < 1.2 &&
            Math.abs(player.position.z - obs.position.z) < 1.6) {
            gameOver();
        }

        if (obs.position.z > 10) {
            scene.remove(obs);
            obstacles.splice(i, 1);
        }
    });

    // Update fuels
    fuels.forEach((f, i) => {
        f.position.z += gameSpeed * 60;
        f.rotation.y += 0.05;
        f.position.y = 0.8 + Math.sin(Date.now() * 0.005) * 0.2;

        // Collect
        if (Math.abs(player.position.x - f.position.x) < 1 &&
            Math.abs(player.position.z - f.position.z) < 1.5) {
            fuel = Math.min(100, fuel + 20);
            score += 5;
            scene.remove(f);
            fuels.splice(i, 1);
        }

        if (f.position.z > 10) {
            scene.remove(f);
            fuels.splice(i, 1);
        }
    });

    // UI
    scoreEl.textContent = Math.floor(score);
    fuelEl.textContent = Math.floor(fuel);
    speedEl.textContent = Math.floor(gameSpeed * 100);

    renderer.render(scene, camera);
}

function gameOver() {
    gameRunning = false;
    if (score > highScore) {
        highScore = Math.floor(score);
        localStorage.setItem('voidRacer3DHS', highScore);
    }
    highScoreEl.textContent = highScore;
    startScreen.style.display = 'flex';
    startScreen.querySelector('h1').textContent = 'CRASHED 💀';
    startScreen.querySelector('button').textContent = 'RETRY';
}

// Controls
function moveLeft() {
    if (gameRunning && playerLane > 0) {
        playerLane--;
        targetX = lanes[playerLane];
    }
}

function moveRight() {
    if (gameRunning && playerLane < 2) {
        playerLane++;
        targetX = lanes[playerLane];
    }
}

document.getElementById('leftBtn').addEventListener('touchstart', moveLeft);
document.getElementById('leftBtn').addEventListener('click', moveLeft);
document.getElementById('rightBtn').addEventListener('touchstart', moveRight);
document.getElementById('rightBtn').addEventListener('click', moveRight);

// Swipe
let touchStartX = 0;
canvas.addEventListener('touchstart', e => {
    touchStartX = e.touches[0].clientX;
});
canvas.addEventListener('touchend', e => {
    const diff = e.changedTouches[0].clientX - touchStartX;
    if (diff > 50) moveRight();
    if (diff < -50) moveLeft();
});

// Keyboard
document.addEventListener('keydown', e => {
    if (e.code === 'ArrowLeft' || e.code === 'KeyA') moveLeft();
    if (e.code === 'ArrowRight' || e.code === 'KeyD') moveRight();
});

// Resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// Expose startGame to button
window.startGame = startGame;
</script>
</body>
</html>
