<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
    <title>VOID RACER 3D 💀</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#000;overflow:hidden;font-family:'Orbitron',monospace}
        #c{display:block;width:100vw;height:100vh}
        #ui{position:absolute;top:15px;left:0;right:0;display:flex;justify-content:space-around;color:#0f0;font-size:1.1rem;font-weight:900;text-shadow:0 0 10px #0f0;pointer-events:none;z-index:2}
        #startScreen{position:absolute;inset:0;background:rgba(0,0,0,0.95);display:flex;flex-direction:column;justify-content:center;align-items:center;color:#0f0;text-align:center;padding:20px;z-index:10}
        #startScreen h1{font-size:2.5rem;margin-bottom:20px;text-shadow:0 0 20px #0f0}
        #startScreen p{margin:8px 0;font-size:1rem;color:#0ff}
        #startScreen button{background:#0f0;color:#000;border:none;padding:18px 40px;font-size:1.3rem;font-weight:900;font-family:'Orbitron';cursor:pointer;margin-top:25px}
        #startScreen button:active{transform:scale(0.95)}
        #loading{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#0f0;font-size:1.2rem;z-index:11}
      .controls{position:absolute;bottom:20px;left:0;right:0;display:flex;justify-content:center;gap:60px;z-index:5}
      .control-btn{width:70px;height:70px;background:rgba(0,255,0,0.2);border:2px solid #0f0;border-radius:50%;color:#0f0;font-size:2rem;display:flex;align-items:center;justify-content:center;user-select:none}
      .control-btn:active{background:#0f0;color:#000}
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>
    <canvas id="c"></canvas>
    <div id="loading">LOADING CAR... 💀</div>
    <div id="ui">
        <div>SCORE: <span id="score">0</span></div>
        <div>FUEL: <span id="fuel">100</span></div>
        <div>SPEED: <span id="speed">0</span></div>
    </div>
    <div class="controls">
        <div class="control-btn" id="leftBtn">←</div>
        <div class="control-btn" id="rightBtn">→</div>
    </div>
    <div id="startScreen" style="display:none">
        <h1>VOID RACER 3D 💀</h1>
        <p>SWIPE OR TAP TO DODGE</p>
        <p>COLLECT FUEL ⚡</p>
        <p>AVOID FIREWALLS 🚧</p>
        <p>HIGH SCORE: <span id="highScore">0</span></p>
        <button onclick="startGame()">RACE</button>
    </div>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

const canvas = document.getElementById('c');
const scoreEl = document.getElementById('score');
const fuelEl = document.getElementById('fuel');
const speedEl = document.getElementById('speed');
const startScreen = document.getElementById('startScreen');
const highScoreEl = document.getElementById('highScore');
const loadingEl = document.getElementById('loading');

let gameRunning = false;
let score = 0;
let fuel = 100;
let gameSpeed = 0.35;
let highScore = localStorage.getItem('voidRacer3DHS') || 0;
highScoreEl.textContent = highScore;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000011);
scene.fog = new THREE.Fog(0x000011, 15, 90);

const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 6, 12);
camera.lookAt(0, 0, -15);

const renderer = new THREE.WebGLRenderer({canvas, antialias: true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;

// Lights
const ambientLight = new THREE.AmbientLight(0x444466, 0.5);
scene.add(ambientLight);
const dirLight = new THREE.DirectionalLight(0x00ffff, 1.5);
dirLight.position.set(10, 20, 10);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(2048, 2048);
scene.add(dirLight);

// Road texture
function createAsphaltTexture() {
    const size = 512;
    const c = document.createElement('canvas');
    c.width = size; c.height = size;
    const ctx = c.getContext('2d');
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(0, 0, size, size);
    for(let i = 0; i < 5000; i++) {
        const x = Math.random() * size;
        const y = Math.random() * size;
        const shade = Math.floor(Math.random() * 40 + 15);
        ctx.fillStyle = `rgb(${shade},${shade})`;
        ctx.fillRect(x, y, 1, 1);
    }
    return new THREE.CanvasTexture(c);
}

const roadTex = createAsphaltTexture();
roadTex.wrapS = roadTex.wrapT = THREE.RepeatWrapping;
roadTex.repeat.set(2, 30);
roadTex.anisotropy = 16;

// Road
const roadGeo = new THREE.PlaneGeometry(15, 400);
const roadMat = new THREE.MeshStandardMaterial({
    map: roadTex,
    roughness: 0.9,
    metalness: 0.05
});
const road = new THREE.Mesh(roadGeo, roadMat);
road.rotation.x = -Math.PI / 2;
road.position.z = -170;
road.receiveShadow = true;
scene.add(road);

// Center lines
const lineMat = new THREE.MeshBasicMaterial({color: 0xffff00, emissive: 0xffff00, emissiveIntensity: 0.5});
const lineGroup = new THREE.Group();
for(let i = 0; i < 40; i++) {
    const dash = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.02, 3), lineMat);
    dash.position.set(0, 0.03, -i * 10);
    lineGroup.add(dash);
}
scene.add(lineGroup);

// Road edges with bloom
const edgeGeo = new THREE.BoxGeometry(0.5, 0.3, 400);
const edgeMat = new THREE.MeshStandardMaterial({color: 0x00ffff, emissive: 0x00ffff, emissiveIntensity: 0.8});
const leftEdge = new THREE.Mesh(edgeGeo, edgeMat);
leftEdge.position.set(-7.5, 0.15, -170);
const rightEdge = leftEdge.clone();
rightEdge.position.set(7.5, 0.15, -170);
scene.add(leftEdge, rightEdge);

// City buildings
const cityGroup = new THREE.Group();
const buildingMat = new THREE.MeshStandardMaterial({color: 0x111122, emissive: 0x001144, emissiveIntensity: 0.3});
for(let i = 0; i < 30; i++) {
    const h = Math.random() * 20 + 10;
    const building = new THREE.Mesh(new THREE.BoxGeometry(4, h, 4), buildingMat);
    building.position.set(
        (Math.random() > 0.5? -1 : 1) * (15 + Math.random() * 20),
        h/2,
        -i * 15 - Math.random() * 10
    );
    cityGroup.add(building);
}
scene.add(cityGroup);

// Player car - load GLB
let player;
const loader = new GLTFLoader();
const carURL = 'https://threejs.org/examples/models/gltf/ferrari.glb'; // Free sample, swap with yours

loader.load(carURL, (gltf) => {
    player = gltf.scene;
    player.scale.set(0.8, 0.8, 0.8);
    player.position.set(0, 0, 0);
    player.traverse((child) => {
        if (child.isMesh) {
            child.castShadow = true;
            child.receiveShadow = true;
            if (child.material) {
                child.material.emissive = new THREE.Color(0x002222);
                child.material.emissiveIntensity = 0.2;
            }
        }
    });
    scene.add(player);
    loadingEl.style.display = 'none';
    startScreen.style.display = 'flex';
}, undefined, (err) => {
    console.error('Car load failed, using fallback box');
    player = createFallbackCar();
    scene.add(player);
    loadingEl.style.display = 'none';
    startScreen.style.display = 'flex';
});

function createFallbackCar() {
    const car = new THREE.Group();
    const body = new THREE.Mesh(new THREE.BoxGeometry(2, 0.8, 4), new THREE.MeshStandardMaterial({color: 0x00ffff, metalness: 0.8}));
    body.position.y = 0.5;
    car.add(body);
    return car;
}

// Obstacles - concrete barriers
let obstacles = [];
let fuels = [];
const barrierGeo = new THREE.BoxGeometry(3.5, 1.2, 1.5);
const barrierMat = new THREE.MeshStandardMaterial({
    color: 0xff3300,
    emissive: 0xff0000,
    emissiveIntensity: 0.4,
    metalness: 0.6,
    roughness: 0.4
});

// Fuel - glowing ring
const fuelGeo = new THREE.TorusGeometry(0.6, 0.25, 12, 24);
const fuelMat = new THREE.MeshStandardMaterial({
    color: 0x00ff00,
    emissive: 0x00ff00,
    emissiveIntensity: 1.5
});

let lanes = [-4, 0, 4];
let playerLane = 1;
let targetX = 0;

function startGame() {
    if (!player) return;
    gameRunning = true;
    score = 0;
    fuel = 100;
    gameSpeed = 0.35;
    playerLane = 1;
    targetX = lanes[playerLane];
    player.position.x = targetX;

    obstacles.forEach(o => scene.remove(o));
    fuels.forEach(f => scene.remove(f));
    obstacles = [];
    fuels = [];

    startScreen.style.display = 'none';
    animate();
}

function spawnObstacle() {
    if (Math.random() < 0.022) {
        const lane = Math.floor(Math.random() * 3);
        const obs = new THREE.Mesh(barrierGeo, barrierMat);
        obs.position.set(lanes, 0.6, -90);
        obs.castShadow = true;
        scene.add(obs);
        obstacles.push(obs);
    }
}

function spawnFuel() {
    if (Math.random() < 0.01) {
        const lane = Math.floor(Math.random() * 3);
        const f = new THREE.Mesh(fuelGeo, fuelMat);
        f.position.set(lanes, 1.5, -90);
        f.rotation.x = Math.PI / 2;
        scene.add(f);
        fuels.push(f);
    }
}

function animate() {
    if (!gameRunning) return;
    requestAnimationFrame(animate);

    gameSpeed += 0.00002;
    fuel -= 0.02;
    score += 0.1;

    if (fuel <= 0) {
        gameOver();
        return;
    }

    // Player movement
    if (player) {
        player.position.x += (targetX - player.position.x) * 0.12;
        player.rotation.z = (targetX - player.position.x) * 0.06;
        player.rotation.x = Math.sin(Date.now() * 0.008) * 0.015;
    }

    // Scroll road
    roadTex.offset.y += gameSpeed * 0.12;

    // Move lines
    lineGroup.children.forEach(line => {
        line.position.z += gameSpeed * 70;
        if (line.position.z > 20) line.position.z -= 400;
    });

    // Move city
    cityGroup.children.forEach(b => {
        b.position.z += gameSpeed * 70;
        if (b.position.z > 30) b.position.z -= 450;
    });

    spawnObstacle();
    spawnFuel();

    // Update obstacles
    obstacles.forEach((obs, i) => {
        obs.position.z += gameSpeed * 70;

        if (player && Math.abs(player.position.x - obs.position.x) < 2.8 &&
            Math.abs(player.position.z - obs.position.z) < 3) {
            gameOver();
        }

        if (obs.position.z > 20) {
            scene.remove(obs);
            obstacles.splice(i, 1);
        }
    });

    // Update fuels
    fuels.forEach((f, i) => {
        f.position.z += gameSpeed * 70;
        f.rotation.z += 0.06;
        f.position.y = 1.5 + Math.sin(Date.now() * 0.005 + i) * 0.4;

        if (player && Math.abs(player.position.x - f.position.x) < 1.8 &&
            Math.abs(player.position.z - f.position.z) < 2.5) {
            fuel = Math.min(100, fuel + 30);
            score += 15;
            scene.remove(f);
            fuels.splice(i, 1);
        }

        if (f.position.z > 20) {
            scene.remove(f);
            fuels.splice(i, 1);
        }
    });

    // Camera follow
    if (player) {
        camera.position.x += (player.position.x * 0.4 - camera.position.x) * 0.04;
        camera.lookAt(player.position.x, 1, player.position.z - 15);
    }

    scoreEl.textContent = Math.floor(score);
    fuelEl.textContent = Math.floor(fuel);
    speedEl.textContent = Math.floor(gameSpeed * 100);

    renderer.render(scene, camera);
}

function gameOver() {
    gameRunning = false;
    if (score > highScore) {
        highScore = Math.floor(score);
        localStorage.setItem('voidRacer3DHS', highScore);
    }
    highScoreEl.textContent = highScore;
    startScreen.style.display = 'flex';
    startScreen.querySelector('h1').textContent = 'CRASHED 💀';
    startScreen.querySelector('button').textContent = 'RETRY';
}

// Controls
function moveLeft() {
    if (gameRunning && playerLane > 0) {
        playerLane--;
        targetX = lanes[playerLane];
    }
}

function moveRight() {
    if (gameRunning && playerLane < 2) {
        playerLane++;
        targetX = lanes[playerLane];
    }
}

document.getElementById('leftBtn').addEventListener('touchstart', e => {e.preventDefault(); moveLeft()});
document.getElementById('leftBtn').addEventListener('click', moveLeft);
document.getElementById('rightBtn').addEventListener('touchstart', e => {e.preventDefault(); moveRight()});
document.getElementById('rightBtn').addEventListener('click', moveRight);

// Swipe
let touchStartX = 0;
canvas.addEventListener('touchstart', e => {
    touchStartX = e.touches[0].clientX;
});
canvas.addEventListener('touchend', e => {
    const diff = e.changedTouches[0].clientX - touchStartX;
    if (diff > 50) moveRight();
    if (diff < -50) moveLeft();
});

// Keyboard
document.addEventListener('keydown', e => {
    if (e.code === 'ArrowLeft' || e.code === 'KeyA') moveLeft();
    if (e.code === 'ArrowRight' || e.code === 'KeyD') moveRight();
    if (e.code === 'Space' &&!gameRunning) startGame();
});

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

window.startGame = startGame;
</script>
</body>
</html>
