<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
    <title>VOID RACER 💀</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#000;overflow:hidden;font-family:'Orbitron',monospace;display:flex;justify-content:center;align-items:center;height:100vh}
        #gameCanvas{border:2px solid #0f0;box-shadow:0 0 30px #0f0;max-width:100vw;max-height:100vh}
        #ui{position:absolute;top:15px;left:0;right:0;display:flex;justify-content:space-around;color:#0f0;font-size:1.2rem;font-weight:900;text-shadow:0 0 10px #0f0}
        #startScreen{position:absolute;inset:0;background:rgba(0,0,0,0.95);display:flex;flex-direction:column;justify-content:center;align-items:center;color:#0f0;text-align:center;padding:20px}
        #startScreen h1{font-size:2.5rem;margin-bottom:20px;text-shadow:0 0 20px #0f0}
        #startScreen p{margin:8px 0;font-size:1rem;color:#0ff}
        #startScreen button{background:#0f0;color:#000;border:none;padding:18px 40px;font-size:1.3rem;font-weight:900;font-family:'Orbitron';cursor:pointer;margin-top:25px}
        #startScreen button:active{transform:scale(0.95)}
      .controls{position:absolute;bottom:20px;left:0;right:0;display:flex;justify-content:center;gap:60px}
      .control-btn{width:70px;height:70px;background:rgba(0,255,0,0.2);border:2px solid #0f0;border-radius:50%;color:#0f0;font-size:2rem;display:flex;align-items:center;justify-content:center;user-select:none}
      .control-btn:active{background:#0f0;color:#000}
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
</head>
<body>
    <canvas id="gameCanvas" width="400" height="700"></canvas>
    <div id="ui">
        <div>SCORE: <span id="score">0</span></div>
        <div>FUEL: <span id="fuel">100</span></div>
        <div>SPEED: <span id="speed">0</span></div>
    </div>
    <div class="controls">
        <div class="control-btn" id="leftBtn">←</div>
        <div class="control-btn" id="rightBtn">→</div>
    </div>
    <div id="startScreen">
        <h1>VOID RACER 💀</h1>
        <p>SWIPE OR TAP TO DODGE</p>
        <p>COLLECT FUEL ⚡</p>
        <p>AVOID FIREWALLS 🚧</p>
        <p>HIGH SCORE: <span id="highScore">0</span></p>
        <button onclick="startGame()">RACE</button>
    </div>

<script>
const canvas = document.getElementById('gameCanvas')
const ctx = canvas.getContext('2d')
const scoreEl = document.getElementById('score')
const fuelEl = document.getElementById('fuel')
const speedEl = document.getElementById('speed')
const startScreen = document.getElementById('startScreen')
const highScoreEl = document.getElementById('highScore')

let gameRunning = false
let score = 0
let fuel = 100
let gameSpeed = 4
let highScore = localStorage.getItem('voidRacerHS') || 0
highScoreEl.textContent = highScore

const roadWidth = 300
const roadX = (canvas.width - roadWidth) / 2
const laneWidth = roadWidth / 3

const player = {
    x: roadX + laneWidth,
    y: canvas.height - 120,
    w: 40,
    h: 70,
    lane: 1,
    targetX: roadX + laneWidth
}

let obstacles = []
let fuels = []
let roadLines = []

for(let i = 0; i < 10; i++) {
    roadLines.push({ y: i * 80 })
}

function startGame() {
    gameRunning = true
    score = 0
    fuel = 100
    gameSpeed = 4
    player.lane = 1
    player.targetX = roadX + laneWidth
    player.x = player.targetX
    obstacles = []
    fuels = []
    startScreen.style.display = 'none'
    gameLoop()
}

function spawnObstacle() {
    if (Math.random() < 0.02 * gameSpeed/4) {
        const lane = Math.floor(Math.random() * 3)
        obstacles.push({
            x: roadX + lane * laneWidth + 10,
            y: -80,
            w: 40,
            h: 70,
            lane: lane
        })
    }
}

function spawnFuel() {
    if (Math.random() < 0.008) {
        const lane = Math.floor(Math.random() * 3)
        fuels.push({
            x: roadX + lane * laneWidth + 15,
            y: -30,
            w: 30,
            h: 30
        })
    }
}

function gameLoop() {
    if (!gameRunning) return

    gameSpeed = 4 + score * 0.01
    fuel -= 0.05

    if (fuel <= 0) {
        gameOver()
        return
    }

    ctx.fillStyle = '#111'
    ctx.fillRect(0, 0, canvas.width, canvas.height)

    ctx.fillStyle = '#222'
    ctx.fillRect(roadX, 0, roadWidth, canvas.height)

    ctx.strokeStyle = '#0f0'
    ctx.lineWidth = 4
    ctx.setLineDash([20, 20])
    roadLines.forEach(line => {
        line.y += gameSpeed
        if (line.y > canvas.height) line.y = -80
        ctx.beginPath()
        ctx.moveTo(roadX + laneWidth, line.y)
        ctx.lineTo(roadX + laneWidth, line.y + 40)
        ctx.moveTo(roadX + laneWidth * 2, line.y)
        ctx.lineTo(roadX + laneWidth * 2, line.y + 40)
        ctx.stroke()
    })
    ctx.setLineDash([])

    ctx.strokeStyle = '#0f0'
    ctx.shadowColor = '#0f0'
    ctx.shadowBlur = 15
    ctx.lineWidth = 3
    ctx.beginPath()
    ctx.moveTo(roadX, 0)
    ctx.lineTo(roadX, canvas.height)
    ctx.moveTo(roadX + roadWidth, 0)
    ctx.lineTo(roadX + roadWidth, canvas.height)
    ctx.stroke()
    ctx.shadowBlur = 0

    player.x += (player.targetX - player.x) * 0.2

    ctx.fillStyle = '#0ff'
    ctx.shadowColor = '#0ff'
    ctx.shadowBlur = 20
    ctx.fillRect(player.x + 5, player.y, player.w - 10, player.h)
    ctx.fillStyle = '#000'
    ctx.fillRect(player.x + 10, player.y + 10, player.w - 20, 20)
    ctx.shadowBlur = 0

    spawnObstacle()
    obstacles.forEach((obs, i) => {
        obs.y += gameSpeed

        ctx.fillStyle = '#f00'
        ctx.shadowColor = '#f00'
        ctx.shadowBlur = 15
        ctx.fillRect(obs.x, obs.y, obs.w, obs.h)
        ctx.fillStyle = '#000'
        ctx.font = '20px Arial'
        ctx.fillText('🚧', obs.x + 10, obs.y + 45)
        ctx.shadowBlur = 0

        if (player.x < obs.x + obs.w &&
            player.x + player.w > obs.x &&
            player.y < obs.y + obs.h &&
            player.y + player.h > obs.y) {
            gameOver()
        }

        if (obs.y > canvas.height) obstacles.splice(i, 1)
    })

    spawnFuel()
    fuels.forEach((f, i) => {
        f.y += gameSpeed

        ctx.fillStyle = '#0f0'
        ctx.shadowColor = '#0f0'
        ctx.shadowBlur = 20
        ctx.font = '25px Arial'
        ctx.fillText('⚡', f.x, f.y + 25)
        ctx.shadowBlur = 0

        if (player.x < f.x + f.w &&
            player.x + player.w > f.x &&
            player.y < f.y + f.h &&
            player.y + player.h > f.y) {
            fuel = Math.min(100, fuel + 20)
            fuels.splice(i, 1)
            score += 5
        }

        if (f.y > canvas.height) fuels.splice(i, 1)
    })

    score += 0.1
    scoreEl.textContent = Math.floor(score)
    fuelEl.textContent = Math.floor(fuel)
    speedEl.textContent = Math.floor(gameSpeed * 10)

    requestAnimationFrame(gameLoop)
}

function gameOver() {
    gameRunning = false
    if (score > highScore) {
        highScore = Math.floor(score)
        localStorage.setItem('voidRacerHS', highScore)
    }
    highScoreEl.textContent = highScore
    startScreen.style.display = 'flex'
    startScreen.querySelector('h1').textContent = 'CRASHED 💀'
    startScreen.querySelector('button').textContent = 'RETRY'
}

function moveLeft() {
    if (gameRunning && player.lane > 0) {
        player.lane--
        player.targetX = roadX + player.lane * laneWidth + 10
    }
}

function moveRight() {
    if (gameRunning && player.lane < 2) {
        player.lane++
        player.targetX = roadX + player.lane * laneWidth + 10
    }
}

document.getElementById('leftBtn').addEventListener('touchstart', moveLeft)
document.getElementById('leftBtn').addEventListener('click', moveLeft)
document.getElementById('rightBtn').addEventListener('touchstart', moveRight)
document.getElementById('rightBtn').addEventListener('click', moveRight)

let touchStartX = 0
canvas.addEventListener('touchstart', e => {
    touchStartX = e.touches[0].clientX
})
canvas.addEventListener('touchend', e => {
    const diff = e.changedTouches[0].clientX - touchStartX
    if (diff > 50) moveRight()
    if (diff < -50) moveLeft()
})

document.addEventListener('keydown', e => {
    if (e.code === 'ArrowLeft' || e.code === 'KeyA') moveLeft()
    if (e.code === 'ArrowRight' || e.code === 'KeyD') moveRight()
})
</script>
</body>
</html>
